name: Auto Alpha Version Bump

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: version-bump-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump-version:
    if: (github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')) && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bump alpha version
        run: python tools/bump_alpha_version.py

      - name: Commit and push VERSION
        run: |
          if git diff --quiet -- VERSION; then
            echo "No version changes detected."
            exit 0
          fi
          VERSION_VALUE=$(cat VERSION)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: auto-bump alpha version to ${VERSION_VALUE} [skip ci]"
          git pull --rebase origin ${{ github.ref_name }} || { git rebase --abort; echo "Rebase failed — manual intervention required."; exit 1; }
          git push origin HEAD:${{ github.ref_name }}
